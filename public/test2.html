<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard test 2 (no locking)</title>
    <style>
      body { margin: 0; font-family: sans-serif; }
      .content { height: 90vh; background: #E9DFD3; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; }
      .bar { padding: 12px; background: #fff; }
      input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="content">This is the "wallpaper" area (test 2 - no locking)</div>
    <div class="bar"><input placeholder="Tap me and open the keyboard" /></div>
  </body>
</html>
